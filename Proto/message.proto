//     int32 motor7 = 7;
//     int32 motor8 = 8;      
// }

message motorCommand {
    float motor1 = 1;      
    float motor2 = 2;
    float motor3 = 3;
    float motor4 = 4;      
    float motor5 = 5;      
    float motor6 = 6;
    float motor7 = 7;
    float motor8 = 8;      
}

message AccelData {
    float x = 1;
    float y = 2;
    float z = 3;
}

message sensorData {
    uint32 id = 1;
    oneof data {
        float temperature = 2;
        AccelData accel = 3;
        float amperage = 4;
    }       
}

message MyMessage {
    int32 id = 1;
    string content = 2;
}

message Envelope {
    oneof payload {
        operationStatus status = 1;
        positionCommand pos = 2;
        MyMessage debug = 3;
        motorCommand motor_msg = 4;
        sensorData readings = 5;
    }
}