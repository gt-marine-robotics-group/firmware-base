; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
extra_scripts = 
	pre:../generate_proto.py
	pre:../generate_pio.py

[env:board_alpha]
build_flags = 
	-D BOARD_ALPHA
	-D HAS_MOTORS
	-D HAS_INDICATOR_LED
	-D HAS_LED_MUX
	-D HAS_ESTOP
	-D HAS_STATUS_LIGHT
	-I include
lib_deps = 
	adafruit/Adafruit NeoPixel@^1.15.2
	bakercp/PacketSerial@^1.4.0
	nanopb/Nanopb@^0.4.91

[env:board_beta]
build_flags = 
	-D BOARD_BETA
	-D HAS_INDICATOR_LED
	-D HAS_ESTOP
	-D HAS_SENSORS
	-D HAS_STATUS_LIGHT
	-I include
lib_deps = 
	nanopb/Nanopb@^0.4.91
	sparkfun/SparkFun Si7021 Humidity and Temperature Sensor@^2.0.0
	adafruit/Adafruit LSM9DS1 Library@^2.2.1
	adafruit/Adafruit NeoPixel@^1.15.2
	bakercp/PacketSerial@^1.4.0

[env:board_gamma]
build_flags = 
	-D BOARD_GAMMA
	-D HAS_ESTOP
	-D HAS_PROTO
	-D HAS_MOTORS
	-I include
lib_deps = 
	nanopb/Nanopb@^0.4.91
	bakercp/PacketSerial@^1.4.0

[env:boat_presto_jr]
build_flags = 
	-D BOARD_DELTA
	-D HAS_ESTOP
	-D HAS_PROTO
	-I include
lib_deps = 
	nanopb/Nanopb@^0.4.91
	bakercp/PacketSerial@^1.4.0

[env:sub_presto]
build_flags = 
	-D BOARD_EPSILON
	-D HAS_ESTOP
	-D HAS_PROTO
	-D HAS_LED_MUX
	-D HAS_MOTORS
	-I include
lib_deps = 
	nanopb/Nanopb@^0.4.91
	bakercp/PacketSerial@^1.4.0
	107-systems/107-Arduino-Servo-RP2040 @ ^0.2.0

[env:sensor_demo_zeta]
build_flags = 
    -D SENSOR_DEMO
    -D HAS_ESTOP
    -D HAS_PROTO
    -D HAS_LED_MUX
    -I include
    -D USE_TINYUSB
    -D HAS_SENSOR
    -D HAS_TEMP_SENSOR
    -D HAS_DOF_SENSOR
lib_deps = 
    nanopb/Nanopb@^0.4.91
    bakercp/PacketSerial@^1.4.0
    sparkfun/SparkFun Si7021 Humidity and Temperature Sensor@^2.0.0
    adafruit/Adafruit LSM9DS1 Library@^2.2.1    ; SparkFun is erroring out
    
[env:sensor_probe_demo_zeta]   ; Proof-of-concept for sensor inheritance
debug_tool = cmsis-dap
upload_protocol = cmsis-dap
debug_speed = 3000
build_type = debug
build_flags = 
    -D SENSOR_DEMO
    -D HAS_ESTOP
    -D HAS_PROTO
    -D HAS_LED_MUX
    -I include
    -D USE_TINYUSB
    -D HAS_SENSOR
    -D HAS_TEMP_SENSOR
    -D HAS_DOF_SENSOR
lib_deps = 
    nanopb/Nanopb@^0.4.91
    bakercp/PacketSerial@^1.4.0
    sparkfun/SparkFun Si7021 Humidity and Temperature Sensor@^2.0.0
    adafruit/Adafruit LSM9DS1 Library@^2.2.1    ; SparkFun is erroring out


[env:sensor_rtos_demo_zeta]   ; Proof-of-concept for sensor inheritance
; debug_tool = cmsis-dap
; upload_protocol = cmsis-dap
; debug_speed = 3000
; build_type = debug
build_flags = 
    -D SENSOR_RTOS_DEMO
    -D HAS_ESTOP
    -D HAS_PROTO
    -D HAS_LED_MUX
    -I include
    -D USE_TINYUSB
    -D HAS_SENSOR
    -D HAS_TEMP_SENSOR
    -D HAS_DOF_SENSOR
    -D HAS_STATUS_LIGHT
;     -D PICO_STDIO_UART=1      ;; Trying to get the picoprobe to also run protobuf
;     -D PICO_STDIO_USB=0
; monitor_speed = 115200
lib_deps = 
    nanopb/Nanopb@^0.4.91
    bakercp/PacketSerial@^1.4.0
    sparkfun/SparkFun Si7021 Humidity and Temperature Sensor@^2.0.0
    adafruit/Adafruit LSM9DS1 Library@^2.2.1    ; SparkFun is erroring out
    adafruit/Adafruit NeoPixel@^1.15.2      ; NeoPixel Libarary
    